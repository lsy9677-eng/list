<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026 제1회 모던클럽배 테니스대회 예선 대진표</title>
  <style>
    body {
      margin: 0;
      background: #f4f6fb;
      color: #0f1e3a;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", Arial, sans-serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 14px 16px;
      background: #0f1e3a;
      color: white;
      box-shadow: 0 4px 18px rgba(0,0,0,.18);
    }
    h1 {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.35;
      text-align: center;
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px 10px 36px;
    }
    .notice {
      margin: 0 auto 14px;
      max-width: 900px;
      padding: 10px 12px;
      border: 1px solid #d5dbea;
      border-radius: 12px;
      background: white;
      font-size: .9rem;
      line-height: 1.6;
      text-align: center;
    }
    .page {
      margin: 0 auto 18px;
      border-radius: 14px;
      overflow: hidden;
      background: white;
      box-shadow: 0 8px 24px rgba(15,30,58,.10);
      border: 1px solid #d5dbea;
    }
    .page-title {
      padding: 10px 14px;
      font-weight: 900;
      background: #eef4ff;
      border-bottom: 1px solid #d5dbea;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
      background: white;
    }
    footer {
      text-align: center;
      color: #64748b;
      font-size: .78rem;
      padding: 10px 0 0;
    }
    @media (max-width: 680px) {
      header { padding: 12px 10px; }
      h1 { font-size: .95rem; }
      .wrap { padding: 10px 6px 28px; }
      .notice { font-size: .8rem; }
      .page { border-radius: 10px; margin-bottom: 12px; }
      .page-title { font-size: .82rem; padding: 8px 10px; }
    }
  </style>
</head>
<body>
  <header><h1>2026 제1회 모던클럽배 테니스대회 예선 대진표</h1></header>
  <main class="wrap">
    <div class="notice">아래 이미지를 확대해서 확인하세요. 휴대폰에서는 손가락으로 확대 가능합니다.</div>
    <section class="page">
      <div class="page-title">1/2 페이지</div>
      <img src="prelim_draw_01.png" alt="예선 대진표 1페이지">
    </section>
    <section class="page">
      <div class="page-title">2/2 페이지</div>
      <img src="prelim_draw_02.png" alt="예선 대진표 2페이지">
    </section>
    <footer>230MATCH</footer>
  </main>
</body>
</html>
